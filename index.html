<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Painel de Sistemas</title>
<style>
  :root{
    --navy-deep: #0b1e3a;
    --navy: #12294d;
    --navy-light: #1c3a63;
    --gold: #d4a53d;
    --paper: #eef1f6;
    --ink: #10192b;
    --muted: #6b7688;
    --line: #d9dee6;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  body{
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height:100vh;
  }

  header{
    background: linear-gradient(135deg, var(--navy-deep), var(--navy));
    padding: 16px 24px;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
  }
  header::after{
    content:"";
    position:absolute;
    bottom:-2px; left:0; right:0;
    height:4px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  header h1{
    color:#fff;
    font-size: 1.5rem;
    letter-spacing: 0.3px;
    font-weight: 700;
    white-space:nowrap;
  }

  .add-bar{
    display:flex;
    gap:8px;
    flex-wrap: wrap;
    align-items:center;
  }
  .add-bar input{
    width: 180px;
    border:1px solid transparent;
    border-radius:7px;
    padding: 7px 10px;
    font-size:0.8rem;
    background: rgba(255,255,255,0.95);
  }
  .add-bar input:focus{ outline:2px solid var(--gold); border-color:transparent;}
  .add-bar button{
    background: transparent;
    color:#fff;
    border:1.5px solid #fff;
    border-radius:7px;
    padding: 7px 14px;
    font-weight:600;
    font-size:0.8rem;
    cursor:pointer;
    white-space:nowrap;
    transition: background .15s ease, color .15s ease;
  }
  .add-bar button:hover{ background:#fff; color: var(--navy); }

  main{
    max-width: 1400px;
    margin: 18px auto 60px;
    padding: 0 20px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 14px;
  }

  .card{
    background:#fff;
    border-radius: 8px;
    overflow:hidden;
    box-shadow: 0 2px 8px rgba(11,30,58,0.10);
    display:flex;
    flex-direction:column;
    text-decoration:none;
    color:inherit;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(11,30,58,0.18);
  }

  .card-title{
    padding: 6px 8px;
    font-weight:700;
    font-size:0.66rem;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:5px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card-title span:first-child{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .card-title .dot{
    width:5px; height:5px; border-radius:50%;
    background: var(--gold);
    flex-shrink:0;
  }

  .browser-frame{
    background: #dfe4ec;
    padding: 3px 5px;
    display:flex;
    align-items:center;
    gap:3px;
  }
  .browser-frame span{
    width:5px; height:5px; border-radius:50%;
  }
  .b-red{background:#ef5f57;}
  .b-yellow{background:#f6bf4f;}
  .b-green{background:#61c454;}

  .thumb-wrap{
    position:relative;
    width:100%;
    aspect-ratio: 16 / 10;
    background: var(--navy-deep) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><rect width="40" height="40" fill="none"/></svg>');
    overflow:hidden;
  }
  .thumb-wrap img{
    width:100%;
    height:100%;
    object-fit: cover;
    object-position: top;
    display:block;
  }
  .thumb-wrap .loading{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#9fb0cc;
    font-size:0.6rem;
    text-align:center;
    padding:0 6px;
  }

  .card-footer{
    padding: 5px 8px 8px;
    font-size:0.6rem;
    color: var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .empty{
    text-align:center;
    color: var(--muted);
    padding: 40px 20px;
  }

  @media (max-width: 1024px){
    .grid{ grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 640px){
    .grid{ grid-template-columns: repeat(2, 1fr); gap:10px; }
    header{ flex-direction:column; align-items:stretch; padding: 14px 16px; }
    header h1{ font-size: 1.3rem; text-align:center; }
    .add-bar{ justify-content:center; }
    .add-bar input{ width: 100%; flex:1; min-width:120px; }
  }
</style>
</head>
<body>

<header>
  <h1>Painel de Sistemas</h1>
  <div class="add-bar">
    <input id="newTitle" type="text" placeholder="Nome do sistema (ex: Portal Gravames)">
    <input id="newUrl" type="text" placeholder="https://link-do-sistema.com">
    <button onclick="addCard()">Adicionar card</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <p class="empty" id="emptyMsg" style="display:none;">Nenhum link cadastrado ainda. Adicione um acima.</p>
</main>

<script>
  // Lista inicial de links. Para adicionar mais depois, basta editar este array
  // ou usar a barra "Adicionar card" no topo da página.
  let links = [
    { title: "NetCarros", url: "https://carbankapp1-dev.github.io/netcarros/" },
    { title: "Propostas", url: "https://demandassp1-vw.github.io/propostas/" },
    { title: "Taxa Especial", url: "https://demandassp1-vw.github.io/taxa_especial/" },
    { title: "Baixa Temporária - Ofício", url: "https://demandassp1-vw.github.io/baixa-temporaria-oficio/" }
  ];

  function screenshotUrl(targetUrl){
    // Serviço gratuito de screenshot automático: recebe a URL do site
    // e devolve uma imagem da tela renderizada, sem precisar acessar manualmente.
    return `https://image.thum.io/get/width/900/crop/560/noanimate/${targetUrl}`;
  }

  function render(){
    const grid = document.getElementById('grid');
    const emptyMsg = document.getElementById('emptyMsg');
    grid.innerHTML = '';

    if(links.length === 0){
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';

    links.forEach(link => {
      const card = document.createElement('a');
      card.className = 'card';
      card.href = link.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';

      let hostname = '';
      try { hostname = new URL(link.url).hostname; } catch(e) { hostname = link.url; }

      card.innerHTML = `
        <div class="card-title">
          <span>${link.title}</span>
          <span class="dot"></span>
        </div>
        <div class="browser-frame">
          <span class="b-red"></span><span class="b-yellow"></span><span class="b-green"></span>
        </div>
        <div class="thumb-wrap">
          <div class="loading">Carregando prévia...</div>
          <img loading="lazy" src="${screenshotUrl(link.url)}" alt="Prévia de ${link.title}"
               onload="this.previousElementSibling.style.display='none'"
               onerror="this.previousElementSibling.textContent='Prévia indisponível'">
        </div>
        <div class="card-footer">${hostname}</div>
      `;
      grid.appendChild(card);
    });
  }

  function addCard(){
    const titleInput = document.getElementById('newTitle');
    const urlInput = document.getElementById('newUrl');
    const title = titleInput.value.trim();
    let url = urlInput.value.trim();

    if(!title || !url){
      alert('Preencha o nome e o link do sistema.');
      return;
    }
    if(!/^https?:\/\//i.test(url)){
      url = 'https://' + url;
    }

    links.push({ title, url });
    titleInput.value = '';
    urlInput.value = '';
    render();
  }

  render();
</script>

</body>
</html>
